apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sonarqube
spec:
  serviceName: sonarqube-headless
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: sonarqube
          image: sonarqube:latest
          ports:
            - containerPort: 9000
              name: http
          volumeMounts:
            - name: sonarqube-data
              mountPath: /opt/sonarqube/data
            - name: sonarqube-extensions
              mountPath: /opt/sonarqube/extensions
            - name: sonarqube-logs
              mountPath: /opt/sonarqube/logs
  volumeClaimTemplates:
    - metadata:
        name: sonarqube-data
      spec:
        storageClassName: gp2
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
    - metadata:
        name: sonarqube-extensions
      spec:
        storageClassName: gp2
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
    - metadata:
        name: sonarqube-logs
      spec:
        storageClassName: gp2
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
# Headless Service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-headless
spec:
  clusterIP: None
  selector:
    app: sonarqube
  ports:
    - name: http
      port: 9000
      targetPort: 9000
---
# NodePort Service for external access
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-nodeport
spec:
  type: NodePort
  selector:
    app: sonarqube
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 32090
